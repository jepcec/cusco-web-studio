<svg width="250" height="100" viewBox="0 0 250 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Definiciones de estilos y efectos -->
  <defs>
    <!-- Gradiente lineal para las letras -->
    <linearGradient id="gradienteLetras" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9B51E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra para las letras -->
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Letras JWS con estilo mejorado -->
  <text x="125" y="70" 
        font-family="Helvetica, Arial, sans-serif" 
        font-size="70" 
        fill="url(#gradienteLetras)" 
        font-weight="800" 
        letter-spacing="-4"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#sombra)">
    JWS
  </text>
  
  <!-- Línea decorativa inferior -->
  <line x1="75" y1="85" x2="175" y2="85" 
        stroke="url(#gradienteLetras)" 
        stroke-width="3" 
        stroke-linecap="round"/>
  
  <!-- Pequeño detalle de punto decorativo -->
  <circle cx="180" cy="50" r="3" fill="#4A90E2" opacity="0.6"/>
</svg>
